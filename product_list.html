{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Products</h2>
<form class="mb-4" method="get">
    <div class="input-group">
        <input type="text" name="q" class="form-control" placeholder="Search products..." value="{{ query }}">
        <button class="btn btn-outline-secondary" type="submit">Search</button>
    </div>
</form>
<div class="row">
    {% for product in products %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            {% if product.image %}
            <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}">
            {% endif %}
            <div class="card-body">
                <h5 class="card-title"><a href="{% url 'product_detail' pk=product.pk %}" class="text-decoration-none">{{ product.name }}</a></h5>
                <p class="card-text">{{ product.description|truncatechars:100 }}</p>
                <p class="card-text"><strong>${{ product.price }}</strong></p>
                <p class="card-text">Rating: {{ product.average_rating|floatformat:1 }}/5</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
