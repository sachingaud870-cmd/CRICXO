{% extends 'base.html' %}

{% block title %}Profile - CRICXO{% endblock %}

{% block content %}
<h1>Your Profile</h1>
<div class="card">
    <div class="card-body">
        <h5 class="card-title">Welcome, {{ user.username }}!</h5>
        <p class="card-text">Email: {{ user.email }}</p>
        <p class="card-text">Member since: {{ user.date_joined|date:"F j, Y" }}</p>
    </div>
</div>
{% endblock %}
